<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Caffè Fedeltà</title>
<meta name="theme-color" content="#2C1810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caffè Fedeltà">
<link id="pwa-manifest" rel="manifest" href="">
<link id="pwa-icon" rel="apple-touch-icon" href="">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --espresso:#2C1810;--crema:#C8956C;--latte:#F5E6D3;
  --foam:#FAF3EC;--gold:#D4A853;--dark-gold:#A07830;
  --text:#1A0F0A;--muted:#6B4E3D;
  --success:#2D7A3A;--sbg:#E8F5E9;
  --danger:#c0392b;--dbg:#fdecea;
  --r:16px;--rs:10px;
}
body{font-family:'Georgia',serif;background:var(--foam);color:var(--text);min-height:100vh;}
.view{display:none;min-height:100vh;}.view.active{display:block;}
.centered{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center;}
.card{background:white;border-radius:var(--r);padding:18px;box-shadow:0 2px 14px rgba(44,24,16,.09);margin-bottom:14px;}
.card h2{font-size:15px;color:var(--espresso);margin-bottom:12px;font-weight:normal;}
.nav{background:var(--espresso);display:flex;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:10;}
.nav-btn{flex:1;padding:12px 4px;background:none;border:none;color:rgba(255,255,255,.5);font-family:'Georgia',serif;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s;}
.nav-btn svg{width:19px;height:19px;}
.nav-btn.active{color:var(--gold);border-bottom:2px solid var(--gold);}
.back-btn{background:none;border:none;color:rgba(255,255,255,.7);font-family:'Georgia',serif;font-size:13px;padding:12px 16px;cursor:pointer;}
.page{display:none;padding:14px;max-width:480px;margin:0 auto;}.page.active{display:block;}
.lbl{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:4px;display:block;}
.inp{width:100%;padding:11px 14px;border:1px solid var(--latte);border-radius:var(--rs);font-size:15px;font-family:'Georgia',serif;background:white;color:var(--text);outline:none;margin-bottom:12px;}
.inp:focus{border-color:var(--crema);}
.btn{width:100%;padding:12px;border-radius:var(--rs);border:none;font-family:'Georgia',serif;font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:9px;}
.btn:active{transform:scale(.97);}
.btn-dark{background:var(--espresso);color:white;}.btn-dark:hover{background:#3d2418;}
.btn-gold{background:var(--gold);color:white;}.btn-gold:hover{background:var(--dark-gold);}
.btn-success{background:var(--success);color:white;}
.btn-danger{background:var(--danger);color:white;}
.btn-ghost{background:var(--foam);color:var(--muted);border:1px solid var(--latte);font-size:13px;padding:9px;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.hdr{text-align:center;padding:14px 0;}.hdr .cup{font-size:42px;display:block;margin-bottom:5px;}
.hdr h1{font-size:21px;font-weight:normal;color:var(--espresso);}
.hdr p{font-size:13px;color:var(--muted);font-style:italic;margin-top:2px;}
.stamp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.stamp{aspect-ratio:1;border-radius:50%;border:2px dashed var(--crema);display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--foam);position:relative;transition:all .3s;}
.stamp.filled{border:2px solid var(--crema);background:var(--latte);}
.stamp.cap.filled{background:#f0e0d0;border-color:#b8845a;}
.stamp.free{border:2px solid var(--gold);background:#fff8e8;animation:pgold 2s infinite;}
@keyframes pgold{0%,100%{box-shadow:0 0 0 0 rgba(212,168,83,.4)}50%{box-shadow:0 0 0 6px rgba(212,168,83,0)}}
.stamp-num{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap;}
.stamp-row{padding-bottom:20px;}
.prog-bar{height:6px;background:var(--latte);border-radius:99px;overflow:hidden;margin-top:12px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--crema),var(--gold));border-radius:99px;transition:width .5s;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;}
.totals{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.tot-item{background:var(--foam);border-radius:var(--rs);padding:11px;text-align:center;}
.tot-num{font-size:24px;color:var(--espresso);line-height:1;margin-bottom:3px;}
.tot-label{font-size:11px;color:var(--muted);font-style:italic;}
.tot-item.gold{background:#fff8e8;border:1px solid rgba(212,168,83,.3);}
.tot-item.gold .tot-num{color:var(--dark-gold);}
.alert{border-radius:var(--rs);padding:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:13px;}
.alert .ai{font-size:24px;flex-shrink:0;}
.alert p{font-size:13px;line-height:1.5;}
.alert strong{font-size:14px;display:block;margin-bottom:2px;}
.alert-success{background:var(--sbg);border:1px solid #a5d6a7;}.alert-success p{color:var(--success);}
.alert-gold{background:#fffdf0;border:2px solid var(--gold);}.alert-gold p{color:var(--dark-gold);}
.alert-danger{background:var(--dbg);border:1px solid #f5c6c6;}.alert-danger p{color:var(--danger);}
.qr-box{text-align:center;padding:10px 0;}
#qrcode-barista{display:inline-block;padding:12px;background:white;border-radius:var(--r);border:2px solid var(--latte);}
.qr-timer-bar{height:5px;background:var(--latte);border-radius:99px;overflow:hidden;margin-top:12px;}
.qr-timer-fill{height:100%;background:var(--gold);border-radius:99px;transition:width 1s linear;}
.qr-timer-label{font-size:12px;color:var(--muted);font-style:italic;text-align:center;margin-top:4px;}
.qr-token{font-family:monospace;font-size:10px;color:var(--crema);background:var(--espresso);padding:5px 10px;border-radius:8px;display:block;text-align:center;margin-top:9px;word-break:break-all;}
.approv{background:var(--sbg);border:2px solid #66bb6a;border-radius:var(--r);padding:18px;margin-bottom:14px;display:none;animation:sldIn .3s ease;}
.approv.show{display:block;}
@keyframes sldIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.drink-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.drink-opt{padding:11px;border-radius:var(--rs);border:2px solid var(--latte);background:white;font-family:'Georgia',serif;font-size:14px;cursor:pointer;text-align:center;transition:all .15s;}
.drink-opt .di{font-size:26px;display:block;margin-bottom:3px;}
.drink-opt.sel{border-color:var(--crema);background:var(--latte);}
.drink-opt.sel.cap{border-color:#b8845a;background:#f0e0d0;}
.qty-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:14px;}
.qty-btn{width:46px;height:46px;border-radius:50%;border:2px solid var(--crema);background:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--espresso);transition:all .15s;}
.qty-btn:hover{background:var(--latte);}
.qty-num{font-size:38px;color:var(--espresso);min-width:50px;text-align:center;}
.cam-wrap{position:relative;border-radius:var(--r);overflow:hidden;background:#000;margin-bottom:12px;}
.cam-wrap video{width:100%;display:block;max-height:260px;object-fit:cover;}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.cam-frame{width:170px;height:170px;border:3px solid var(--gold);border-radius:12px;position:relative;}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--gold);border-style:solid;}
.cam-frame::before{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:4px 0 0 0;}
.cam-frame::after{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 4px 0;}
.scan-line{position:absolute;left:8px;right:8px;height:2px;background:var(--gold);top:10%;animation:scanln 2s linear infinite;opacity:.8;}
@keyframes scanln{0%{top:10%}100%{top:88%}}
.hist-list{list-style:none;}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--latte);font-size:13px;}
.hist-item:last-child{border:none;}
.hist-icon{font-size:19px;min-width:27px;text-align:center;}
.hist-name{color:var(--espresso);flex:1;}
.hist-time{color:var(--muted);font-style:italic;font-size:11px;}
.hist-pts{color:var(--gold);font-size:11px;font-weight:bold;}
.empty{text-align:center;color:var(--muted);font-style:italic;font-size:14px;padding:18px 0;}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;padding:24px;}
.pin-dots{display:flex;gap:12px;margin:18px 0;}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--crema);transition:all .15s;}
.pin-dot.filled{background:var(--crema);}
.pin-pad{display:grid;grid-template-columns:repeat(3,70px);gap:11px;}
.pin-key{width:70px;height:70px;border-radius:50%;border:1px solid var(--latte);background:white;font-size:21px;font-family:'Georgia',serif;cursor:pointer;transition:all .15s;color:var(--espresso);}
.pin-key:hover{background:var(--latte);}
.pin-key:active{transform:scale(.93);background:var(--crema);color:white;}
.pin-err{color:var(--danger);font-size:13px;font-style:italic;margin-top:7px;min-height:20px;text-align:center;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.status-dot.green{background:#4caf50;}
.status-dot.red{background:var(--danger);}
.stat-row{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:.5px solid var(--latte);}
.stat-row:last-child{border:none;}
.stat-row span:first-child{color:var(--muted);font-style:italic;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--espresso);color:white;padding:10px 20px;border-radius:28px;font-size:14px;font-family:'Georgia',
